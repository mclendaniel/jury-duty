name: Check jury duty status
on:
  workflow_dispatch: {}  # triggered by cron-job.org at 5:05 PM PDT
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python check.py
